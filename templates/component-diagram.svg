<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" role="img" aria-label="Four-layer architecture component diagram template">
  <title>Four-Layer Architecture Template</title>
  <desc>Template for the 4-layer model: Edge, Gateway, Services, and Data layers</desc>
  <defs>
    <linearGradient id="edgeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D83B01;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A52A00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gatewayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="servicesGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00B294;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008272;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C2D91;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B1E5E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#FAFAFA"/>
  <text x="450" y="30" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#323130">
    Four-Layer Architecture Model
  </text>
</svg>