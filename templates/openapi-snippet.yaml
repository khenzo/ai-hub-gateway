# OpenAPI 3.0 Template
# Copy this file as a starting point for your API documentation

openapi: 3.0.3
info:
  title: AI Landing Zone API
  description: |
    API for managing AI Landing Zone resources including gateways, policies, and access contracts.
    
    ## Authentication
    
    This API uses Bearer token authentication. Include your API token in the 
    `Authorization` header:
    
    ```
    Authorization: Bearer YOUR_API_TOKEN
    ```
    
    ## Rate Limiting
    
    - Default: 1000 requests/hour
    - Burst: 100 requests/minute
    - Headers: X-RateLimit-*
    
    ## Base URL
    
    All endpoints are relative to: `https://api.ailandingzone.com/v1`
  version: 1.0.0
  contact:
    name: AI Landing Zone Support
    email: support@ailandingzone.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.ailandingzone.com/v1
    description: Production server
  - url: https://api.staging.ailandingzone.com/v1
    description: Staging server

# Security schemes
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the authentication endpoint

  schemas:
    # Common schemas
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Error code
              example: INVALID_REQUEST
            message:
              type: string
              description: Human-readable error message
              example: Request validation failed
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    Pagination:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items
          example: 150
        limit:
          type: integer
          description: Items per page
          example: 20
        offset:
          type: integer
          description: Current offset
          example: 0
        has_more:
          type: boolean
          description: Whether more results exist
          example: true

    # Resource schema
    Resource:
      type: object
      required:
        - id
        - name
        - status
        - created_at
      properties:
        id:
          type: string
          description: Unique resource identifier
          example: res_abc123xyz
        name:
          type: string
          description: Resource name
          minLength: 1
          maxLength: 100
          example: Production Gateway
        description:
          type: string
          description: Resource description
          maxLength: 500
          example: Main gateway for production environment
        status:
          type: string
          enum: [active, inactive, pending, error]
          example: active
        config:
          type: object
          description: Resource configuration
        metadata:
          type: object
          description: Additional metadata
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2024-01-15T10:30:00Z"

    # Request bodies
    CreateResourceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: My Resource
        description:
          type: string
          maxLength: 500
          example: Description of the resource

    UpdateResourceRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        status:
          type: string
          enum: [active, inactive]

  parameters:
    ResourceIdParam:
      name: id
      in: path
      required: true
      description: Resource unique identifier
      schema:
        type: string
      example: res_abc123xyz

    LimitParam:
      name: limit
      in: query
      description: Maximum number of results to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20

# Endpoints
paths:
  /resources:
    get:
      summary: List resources
      description: Retrieve a paginated list of resources
      operationId: listResources
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: List of resources
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Resource'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

    post:
      summary: Create resource
      description: Create a new resource
      operationId: createResource
      tags:
        - Resources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceRequest'
      responses:
        '201':
          description: Resource created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /resources/{id}:
    get:
      summary: Get resource
      description: Retrieve a specific resource by ID
      operationId: getResource
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/ResourceIdParam'
      responses:
        '200':
          description: Resource details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '401':
          description: Unauthorized
        '404':
          description: Resource not found

    put:
      summary: Update resource
      description: Update an existing resource
      operationId: updateResource
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/ResourceIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResourceRequest'
      responses:
        '200':
          description: Resource updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Resource not found

    delete:
      summary: Delete resource
      description: Delete a resource
      operationId: deleteResource
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/ResourceIdParam'
      responses:
        '204':
          description: Resource deleted
        '401':
          description: Unauthorized
        '404':
          description: Resource not found

# Tags
tags:
  - name: Resources
    description: Resource management endpoints

# External documentation
externalDocs:
  description: Find more info here
  url: https://docs.ailandingzone.com/api
