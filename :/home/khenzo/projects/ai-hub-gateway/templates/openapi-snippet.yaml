:# OpenAPI 3.0 Template
# Copy this file as a starting point for your API documentation

openapi: 3.0.3
info:
  title: AI Landing Zone API
  description: |
    API for managing AI Landing Zone resources including gateways, policies, and access contracts.
    
    ## Authentication
    
    This API uses Bearer token authentication. Include your API token in the 
    `Authorization` header:
    
    ```
    Authorization: Bearer YOUR_API_TOKEN
    ```
    
    ## Rate Limiting
    
    - Default: 1000 requests/hour
    - Burst: 100 requests/minute
    - Headers: X-RateLimit-*
    
    ## Base URL
    
    All endpoints are relative to: `https://api.ailandingzone.com/v1`
  version: 1.0.0
  contact:
    name: AI Landing Zone Support
    email: support@ailandingzone.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.ailandingzone.com/v1
    description: Production server
  - url: https://api.staging.ailandingzone.com/v1
    description: Staging server

# Security schemes
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the authentication endpoint

  schemas:
    # Common schemas
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Error code
              example: INVALID_REQUEST
            message:
              type: string
              description: Human-readable error message
              example: Request validation failed
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    Pagination:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items
          example: 150
        limit:
          type: integer
          description: Items per page
          example: 20
        offset:
          type: integer
          description: Current offset
          example: 0
        has_more:
          type: boolean
          description: Whether more results exist
          example: true

    # Resource schema
    Resource:
      type: object
      required:
        - id
        - name
        - status
        - created_at
      properties:
        id:
          type: string
          description: Unique resource identifier
          example: res_abc123xyz
        name:
          type: string
          description: Resource name
          minLength: 1
          maxLength: 100
          example: Production Gateway
        description:
          type: string
          description: Resource description
          maxLength: 500
          example: Main gateway for production environment
        status:
          type: string
          enum: [active, inactive, pending, error]
          example: active
        config:
          type: object
          description: Resource configuration
          properties:
            setting1:
              type: string
              example: value1
            setting2:
              type: boolean
              example: true
        metadata:
          type: object
          description: Additional metadata
          properties:
            version:
              type: string
              example: "1.0.0"
            tags:
              type: array
              items:
                type: string
              example: ["production", "critical"]
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2024-01-15T10:30:00Z"

    # Request bodies
    CreateResourceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: My Resource
        description:
          type: string
          maxLength: 500
          example: Description of the resource
        config:
          type: object
          properties:
            setting1:
              type: string
            setting2:
              type: boolean
              default: false

    UpdateResourceRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        config:
          type: object
        status:
          type: string
          enum: [active, inactive]

  parameters:
    ResourceIdParam:
      name: id
      in: path
      required: true
      description: Resource unique identifier
      schema:
        type: string
      example: res_abc123xyz

    LimitParam:
      name: limit
      in: query
      description: Maximum number of results to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20

    OffsetParam:
      name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0

    IncludeParam:
      name: include
      in: query
      description: Related resources to include
      schema:
        type: string
      example: metadata,permissions

  responses:
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: INVALID_REQUEST
              message: Request validation failed
              details:
                - field: name
                  message: Name is required

    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: Invalid or missing authentication token

    RateLimitError:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          description: Request limit per hour
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Remaining requests
          schema:
            type: integer
        X-RateLimit-Reset:
          description: Reset timestamp
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

# Endpoints
paths:
  /resources:
    get:
      summary: List resources
      description: Retrieve a paginated list of resources
      operationId: listResources
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/IncludeParam'
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [active, inactive, pending, error]
      responses:
        '200':
          description: List of resources
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Resource'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
              example:
                data:
                  - id: res_123
                    name: Gateway 1
                    status: active
                    created_at: "2024-01-15T10:30:00Z"
                pagination:
                  total: 50
                  limit: 20
                  offset: 0
                  has_more: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'

    post:
      summary: Create resource
      description: Create a new resource
      operationId: createResource
      tags:
        - Resources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceRequest'
      responses:
        '201':
          description: Resource created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Resource already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /resources/{id}:
    get:
      summary: Get resource
      description: Retrieve a specific resource by ID
      operationId: getResource
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/ResourceIdParam'
        - $ref: '#/components/parameters/IncludeParam'
      responses:
        '200':
          description: Resource details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      summary: Update resource
      description: Update an existing resource
      operationId: updateResource
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/ResourceIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResourceRequest'
      responses:
        '200':
          description: Resource updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      summary: Delete resource
      description: Delete a resource
      operationId: deleteResource
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/ResourceIdParam'
      responses:
        '204':
          description: Resource deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

# Tags
tags:
  - name: Resources
    description: Resource management endpoints
  - name: Authentication
    description: Authentication and authorization
  - name: Policies
    description: Policy management

# External documentation
externalDocs:
  description: Find more info here
  url: https://docs.ailandingzone.com/api
