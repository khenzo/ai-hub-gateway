  <!-- AI+ in navy 900 -->
  <text x="4" y="35" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="900" fill="#1A1A24" letter-spacing="-1.5">AI+</text>
  <!-- Wordmark — white text (navbar will be dark even in light mode) -->
